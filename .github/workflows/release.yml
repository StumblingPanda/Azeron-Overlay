name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install keyboard websockets pyinstaller

      - name: Install Node dependencies
        run: npm install

      - name: Build listener
        run: npm run build:listener

      - name: Build app
        run: npx electron-builder --win

      - name: Publish release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version  = "${{ github.ref_name }}".TrimStart('v')
          $exe      = "dist\AzeronOverlay Setup $version.exe"
          $blockmap = "dist\AzeronOverlay Setup $version.exe.blockmap"
          $yml      = "dist\latest.yml"
          gh release create "${{ github.ref_name }}" "$exe" "$blockmap" "$yml" --title "${{ github.ref_name }}" --latest
